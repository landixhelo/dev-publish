    <section id="contact-us">
        <div class="container">
            <div class="row">
                <div class="col-sm-12 col-md-6">
                    <img src="img/Chat bot-amico.svg" style="height: 400px; width: 100%;" alt="chat-bot">
                </div>
                <div class="col-sm-12 col-md-6">
                    <div class="contact-form">
                        <h2 class="text-center mb-4 tom">Le të punojmë në vizionin tuaj</h2>
                    </div>
                </div>
                <div class="col-sm-12 col-md-12">
                    <div class="contact-form">
                        <form id="contactForm">
                            <div class="row">
                                <div class="col-sm-12 col-md-6">
                                    <div class="mb-3 contact-fr">
                                        <label for="name" class="form-label required tom">Emri</label>
                                        <input type="text" class="form-control" id="name" name="name"
                                            placeholder="Vendosni emrin" required>
                                    </div>
                                </div>
                                <div class="col-sm-12 col-md-6">
                                    <div class="mb-3 contact-fr">
                                        <label for="email" class="form-label required tom">Emaili</label>
                                        <input type="email" class="form-control" id="email" name="email"
                                            placeholder="Vendosni emailin" required>
                                    </div>
                                </div>

                                <div class="col-sm-12 col-md-6">
                                    <div class="mb-3 contact-fr">
                                        <label for="subject" class="form-label tom">Subject</label>
                                        <input type="text" class="form-control" id="subject" name="subject"
                                            placeholder="Subjekti">
                                    </div>
                                </div>
                                <div class="col-sm-12 col-md-6">
                                    <div class="mb-3 contact-fr">
                                        <label for="service" class="form-label tom">Sherbimi</label>
                                        <select class="form-select  form-control" id="service" name="Sherbimi">
                                            <option selected>Web Design</option>
                                            <option value="Web Development">Web Development</option>
                                            <option value="SEO">SEO</option>
                                            <option value="Graphic Design">Graphic Design</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-sm-12 col-md-12">
                                    <div class="mb-3 contact-fr">
                                        <label for="message" class="form-label epilogue tom">Mesazh</label>
                                        <textarea class="form-control" id="message" name="message" rows="5"
                                            placeholder="Shkruani mesazhin"></textarea>
                                    </div>
                                </div>
                                <div class="col-sm-12 col-md-6">
                                    <div class="terms">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="terms" required>
                                            <label class="form-check-label" for="terms">
                                              Të gjitha fushat janë të detyrueshme. Duke dërguar formularin, ju pranoni <a href='/terms'>Kushtet dhe Rregullat</a> dhe <a href='/privacy'>Politikën e Privatësisë</a>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-12 col-md-6">
                                    <button type="submit" class="btn btn-primary" style="float: right;" id="submitBtn">
                                        <span id="btnText tom">Dergo Mesazhin</span>
                                        <div class="spinner-border spinner-border-sm d-none" role="status" id="spinner">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="com-sm-12 col-md-4">
                    <div class="contact-info"></div>
                </div>
                <div class="com-sm-12 col-md-4"></div>
                <div class="com-sm-12 col-md-4"></div>
            </div>
        </div>
    </section>
